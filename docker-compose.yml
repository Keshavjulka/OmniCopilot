version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: omni_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: omni_copilot

  backend:
    build: ./backend
    container_name: omni_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: omni_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  mongo_data:
